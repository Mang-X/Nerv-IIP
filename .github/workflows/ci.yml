name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('NuGet.config', 'backend/**/*.csproj', 'backend/**/*.props', 'connector-hosts/**/*.csproj', 'connector-hosts/**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Test backend solution
        run: dotnet test backend/Nerv.IIP.sln --configuration Release

  erp-sales-order-demand-acceptance:
    name: ERP Sales Order Demand Acceptance
    runs-on: ubuntu-latest
    env:
      NERV_IIP_TEST_POSTGRES: Host=127.0.0.1;Port=15432;Database=nerv_iip;Username=nerv;Password=nerv
      NERV_IIP_TEST_REDIS: 127.0.0.1:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('NuGet.config', 'backend/**/*.csproj', 'backend/**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Prepare PostgreSQL and Redis images
        run: |
          docker pull postgres:18
          docker pull redis:8

      - name: Verify ERP sales-order demand bridge
        shell: pwsh
        run: ./scripts/verify-erp-sales-order-demand-planning.ps1

      - name: Upload ERP sales-order demand diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: erp-sales-order-demand-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/acceptance/man517
            artifacts/script-logs/man517-*
          if-no-files-found: warn
          retention-days: 7

  connector-host-tests:
    name: Connector Host Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('NuGet.config', 'backend/**/*.csproj', 'backend/**/*.props', 'connector-hosts/**/*.csproj', 'connector-hosts/**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Test connector host solution
        run: dotnet test connector-hosts/Nerv.IIP.ConnectorHost.sln --configuration Release

  frontend:
    name: Frontend Typecheck and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          package_json_file: frontend/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm -C frontend install --frozen-lockfile

      - name: Typecheck frontend
        run: pnpm -C frontend typecheck

      - name: Build frontend
        run: pnpm -C frontend build

  openapi-client-drift:
    name: OpenAPI/api-client Drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('NuGet.config', 'backend/**/*.csproj', 'backend/**/*.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          package_json_file: frontend/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Verify OpenAPI/api-client drift
        shell: pwsh
        run: ./scripts/verify-openapi-client-drift.ps1

  script-governance:
    name: Script Governance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run script governance check
        shell: pwsh
        run: ./scripts/check-script-governance.ps1
