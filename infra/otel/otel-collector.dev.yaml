# NERV_IIP_ASPIRE_DASHBOARD_OTLP_HTTP_ENDPOINT must be injected by the container
# environment when this config is used directly outside the tracked Compose/AppHost paths.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  debug:
    verbosity: basic
  otlphttp/aspire-dashboard:
    endpoint: ${env:NERV_IIP_ASPIRE_DASHBOARD_OTLP_HTTP_ENDPOINT}
  otlphttp/victorialogs:
    logs_endpoint: ${env:NERV_IIP_VICTORIA_LOGS_OTLP_HTTP_ENDPOINT}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlphttp/aspire-dashboard]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlphttp/aspire-dashboard]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlphttp/aspire-dashboard, otlphttp/victorialogs]
