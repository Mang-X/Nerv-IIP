receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  debug:
    verbosity: basic
  otlphttp/aspire-dashboard:
    endpoint: ${env:NERV_IIP_ASPIRE_DASHBOARD_OTLP_HTTP_ENDPOINT}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlphttp/aspire-dashboard]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlphttp/aspire-dashboard]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlphttp/aspire-dashboard]
