services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: nerv
      POSTGRES_PASSWORD: nerv
      POSTGRES_DB: nerv_iip
    ports:
      - "${NERV_IIP_POSTGRES_PORT:-15432}:5432"
    volumes:
      - nerv-iip-postgres-18:/var/lib/postgresql

  redis:
    image: redis:8
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - nerv-iip-redis:/data

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: pgsty/minio:RELEASE.2026-04-17T00-00-00Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nervminio
      MINIO_ROOT_PASSWORD: nervminio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - nerv-iip-minio:/data

  victoria-logs:
    image: victoriametrics/victoria-logs:v1.50.0
    command: ["-storageDataPath=/victoria-logs-data", "-retentionPeriod=${NERV_IIP_VICTORIA_LOGS_RETENTION:-30d}"]
    ports:
      - "${NERV_IIP_VICTORIA_LOGS_PORT:-9428}:9428"
    volumes:
      - nerv-iip-victoria-logs:/victoria-logs-data

  otel-collector:
    image: otel/opentelemetry-collector:0.116.1
    command: ["--config=/etc/otelcol/config.yaml"]
    environment:
      NERV_IIP_ASPIRE_DASHBOARD_OTLP_HTTP_ENDPOINT: ${NERV_IIP_ASPIRE_DASHBOARD_OTLP_HTTP_ENDPOINT:-http://host.docker.internal:18890}
      NERV_IIP_VICTORIA_LOGS_OTLP_HTTP_ENDPOINT: ${NERV_IIP_VICTORIA_LOGS_OTLP_HTTP_ENDPOINT:-http://victoria-logs:9428/insert/opentelemetry/v1/logs}
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel/otel-collector.dev.yaml:/etc/otelcol/config.yaml:ro

volumes:
  nerv-iip-postgres-18:
  nerv-iip-redis:
  nerv-iip-minio:
  nerv-iip-victoria-logs:
