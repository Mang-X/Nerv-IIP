services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: nerv
      POSTGRES_PASSWORD: nerv
      POSTGRES_DB: nerv_iip
    ports:
      - "${NERV_IIP_POSTGRES_PORT:-15432}:5432"
    volumes:
      - nerv-iip-postgres-18:/var/lib/postgresql

  redis:
    image: redis:8
    ports:
      - "6379:6379"
    volumes:
      - nerv-iip-redis:/data

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: pgsty/minio:RELEASE.2026-04-17T00-00-00Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nervminio
      MINIO_ROOT_PASSWORD: nervminio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - nerv-iip-minio:/data

  otel-collector:
    image: otel/opentelemetry-collector:0.116.1
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel/otel-collector.dev.yaml:/etc/otelcol/config.yaml:ro

volumes:
  nerv-iip-postgres-18:
  nerv-iip-redis:
  nerv-iip-minio:
