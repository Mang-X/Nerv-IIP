    image: nerv-iip/connector-host:${NERV_IIP_IMAGE_TAG:-local}
    build:
      <<: *dotnet-build
      args:
        PROJECT: connector-hosts/src/Nerv.IIP.ConnectorHost.Host/Nerv.IIP.ConnectorHost.Host.csproj
        DLL: Nerv.IIP.ConnectorHost.Host.dll
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      DOTNET_ENVIRONMENT: ${DOTNET_ENVIRONMENT:-Production}
      ConnectorHost__CycleSeconds: ${NERV_IIP_CONNECTOR_HOST_CYCLE_SECONDS:-5}
      ConnectorHost__ConnectorSecret: ${NERV_IIP_CONNECTOR_HOST_SECRET:?set NERV_IIP_CONNECTOR_HOST_SECRET}
      Platform__AppHubBaseUrl: http://apphub:8080
      Platform__OpsBaseUrl: http://ops:8080
    depends_on:
      apphub:
        condition: service_healthy
      ops:
        condition: service_healthy

  console:
    restart: unless-stopped
    image: nerv-iip/console:${NERV_IIP_IMAGE_TAG:-local}
    build:
      context: ../..
      dockerfile: infra/docker/vite-spa.Dockerfile
      args:
        APP_FILTER: "@nerv-iip/console"
        APP_DIR: frontend/apps/console
    ports:
      - "${NERV_IIP_CONSOLE_PORT:-5105}:8080"

  business-console:
