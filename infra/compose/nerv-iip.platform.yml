  business-product-engineering:
    <<: *dotnet-service
    image: nerv-iip/business-product-engineering:${NERV_IIP_IMAGE_TAG:-local}
    build:
      <<: *dotnet-build
      args:
        PROJECT: backend/services/Business/ProductEngineering/src/Nerv.IIP.Business.ProductEngineering.Web/Nerv.IIP.Business.ProductEngineering.Web.csproj
        DLL: Nerv.IIP.Business.ProductEngineering.Web.dll
    environment:
      <<: *dotnet-env
