        DLL: Nerv.IIP.Business.DemandPlanning.Web.dll
    environment:
      <<: *dotnet-env
      ConnectionStrings__PostgreSQL: Host=postgres;Port=5432;Database=nerv_iip_demand_planning;Username=${NERV_IIP_POSTGRES_USER:-nerv};Password=${NERV_IIP_POSTGRES_PASSWORD:?set NERV_IIP_POSTGRES_PASSWORD}
