  business-approval:
    <<: *dotnet-service
    image: nerv-iip/business-approval:${NERV_IIP_IMAGE_TAG:-local}
    build:
      <<: *dotnet-build
      args:
        PROJECT: backend/services/Business/Approval/src/Nerv.IIP.Business.Approval.Web/Nerv.IIP.Business.Approval.Web.csproj
        DLL: Nerv.IIP.Business.Approval.Web.dll
    environment:
