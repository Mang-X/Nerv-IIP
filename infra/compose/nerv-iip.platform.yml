    build:
      <<: *dotnet-build
      args:
        PROJECT: backend/services/Business/Mes/src/Nerv.IIP.Business.Mes.Web/Nerv.IIP.Business.Mes.Web.csproj
        DLL: Nerv.IIP.Business.Mes.Web.dll
    environment:
      <<: *dotnet-env
      ConnectionStrings__PostgreSQL: Host=postgres;Port=5432;Database=nerv_iip_mes;Username=${NERV_IIP_POSTGRES_USER:-nerv};Password=${NERV_IIP_POSTGRES_PASSWORD:?set NERV_IIP_POSTGRES_PASSWORD}
