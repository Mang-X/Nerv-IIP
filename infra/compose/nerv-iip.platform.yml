  business-maintenance:
    <<: *dotnet-service
    image: nerv-iip/business-maintenance:${NERV_IIP_IMAGE_TAG:-local}
    build:
      <<: *dotnet-build
      args:
        PROJECT: backend/services/Business/Maintenance/src/Nerv.IIP.Business.Maintenance.Web/Nerv.IIP.Business.Maintenance.Web.csproj
        DLL: Nerv.IIP.Business.Maintenance.Web.dll
    environment:
      <<: *dotnet-env
      ConnectionStrings__PostgreSQL: Host=postgres;Port=5432;Database=nerv_iip_maintenance;Username=${NERV_IIP_POSTGRES_USER:-nerv};Password=${NERV_IIP_POSTGRES_PASSWORD:?set NERV_IIP_POSTGRES_PASSWORD}
    ports:
      - "${NERV_IIP_MAINTENANCE_PORT:-5117}:8080"

  business-erp:
    <<: *dotnet-service
    image: nerv-iip/business-erp:${NERV_IIP_IMAGE_TAG:-local}
    build:
      <<: *dotnet-build
      args:
        PROJECT: backend/services/Business/Erp/src/Nerv.IIP.Business.Erp.Web/Nerv.IIP.Business.Erp.Web.csproj
        DLL: Nerv.IIP.Business.Erp.Web.dll
    environment:
      <<: *dotnet-env
      ConnectionStrings__PostgreSQL: Host=postgres;Port=5432;Database=nerv_iip_erp;Username=${NERV_IIP_POSTGRES_USER:-nerv};Password=${NERV_IIP_POSTGRES_PASSWORD:?set NERV_IIP_POSTGRES_PASSWORD}
    ports:
      - "${NERV_IIP_ERP_PORT:-5118}:8080"

  gateway:
    <<: *dotnet-service
    image: nerv-iip/platform-gateway:${NERV_IIP_IMAGE_TAG:-local}
    build:
      <<: *dotnet-build
