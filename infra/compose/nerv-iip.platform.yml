      Iam__BaseUrl: http://iam:8080
      Iam__Jwt__JwksJson: ${NERV_IIP_IAM_JWT_JWKS_JSON:?set NERV_IIP_IAM_JWT_JWKS_JSON}
      Iam__Jwt__Issuer: nerv-iip-iam
      Iam__Jwt__Audience: nerv-iip-api
      MasterData__BaseUrl: http://business-master-data:8080
      Inventory__BaseUrl: http://business-inventory:8080
      Quality__BaseUrl: http://business-quality:8080
      Mes__BaseUrl: http://business-mes:8080
      ProductEngineering__BaseUrl: http://business-product-engineering:8080
      DemandPlanning__BaseUrl: http://business-demand-planning:8080
      Security__Cors__AllowedOrigins: ${NERV_IIP_CORS_ALLOWED_ORIGINS:?set NERV_IIP_CORS_ALLOWED_ORIGINS}
