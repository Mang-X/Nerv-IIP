    environment:
      <<: *dotnet-env
      AppHub__BaseUrl: http://apphub:8080
      Iam__BaseUrl: http://iam:8080
      Iam__Jwt__JwksJson: ${NERV_IIP_IAM_JWT_JWKS_JSON:?set NERV_IIP_IAM_JWT_JWKS_JSON}
      Ops__BaseUrl: http://ops:8080
      Notification__BaseUrl: http://notification:8080
      ProductEngineering__BaseUrl: http://business-product-engineering:8080
      VictoriaLogs__BaseUrl: http://victoria-logs:9428
      Security__Cors__AllowedOrigins: ${NERV_IIP_CORS_ALLOWED_ORIGINS:?set NERV_IIP_CORS_ALLOWED_ORIGINS}
    ports:
      - "${NERV_IIP_GATEWAY_PORT:-5100}:8080"

  business-gateway:
    <<: *dotnet-service
    image: nerv-iip/business-gateway:${NERV_IIP_IMAGE_TAG:-local}
    build:
      <<: *dotnet-build
      args:
        PROJECT: backend/gateway/BusinessGateway/src/Nerv.IIP.BusinessGateway.Web/Nerv.IIP.BusinessGateway.Web.csproj
