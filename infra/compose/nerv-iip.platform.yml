name: nerv-iip

x-dotnet-build: &dotnet-build
  context: ../..
  dockerfile: infra/docker/dotnet-service.Dockerfile

x-dotnet-service: &dotnet-service
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    otel-collector:
      condition: service_started
  environment: &dotnet-env
    ASPNETCORE_URLS: http://+:8080
    ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
    DOTNET_ENVIRONMENT: ${DOTNET_ENVIRONMENT:-Production}
    Persistence__Provider: PostgreSQL
    Persistence__AutoMigrate: ${NERV_IIP_AUTO_MIGRATE:-false}
    Messaging__Provider: ${NERV_IIP_MESSAGING_PROVIDER:-Redis}
    RabbitMQ__HostName: rabbitmq
    RabbitMQ__Port: 5672
    RabbitMQ__UserName: ${NERV_IIP_RABBITMQ_USER:-guest}
    RabbitMQ__Password: ${NERV_IIP_RABBITMQ_PASSWORD:-guest}
    ConnectionStrings__Redis: redis:6379
    InternalService__BearerToken: ${NERV_IIP_INTERNAL_SERVICE_BEARER_TOKEN:?set NERV_IIP_INTERNAL_SERVICE_BEARER_TOKEN}
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: http://victoria-logs:9428/insert/opentelemetry/v1/logs
    OpenTelemetry__Protocol: HttpProtobuf
  healthcheck:
    test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
    interval: 15s
    timeout: 5s
    retries: 20

services:
  apphub:
    <<: *dotnet-service
    image: nerv-iip/apphub:${NERV_IIP_IMAGE_TAG:-local}
    build:
      <<: *dotnet-build
      args:
        PROJECT: backend/services/AppHub/src/Nerv.IIP.AppHub.Web/Nerv.IIP.AppHub.Web.csproj
        DLL: Nerv.IIP.AppHub.Web.dll
    environment:
      <<: *dotnet-env
      ConnectionStrings__AppHubDb: Host=postgres;Port=5432;Database=nerv_iip_apphub;Username=${NERV_IIP_POSTGRES_USER:-nerv};Password=${NERV_IIP_POSTGRES_PASSWORD:?set NERV_IIP_POSTGRES_PASSWORD}
      ConnectorHostCredential__Secret: ${NERV_IIP_CONNECTOR_HOST_SECRET:?set NERV_IIP_CONNECTOR_HOST_SECRET}
    ports:
      - "${NERV_IIP_APPHUB_PORT:-5101}:8080"

  iam:
    <<: *dotnet-service
    image: nerv-iip/iam:${NERV_IIP_IMAGE_TAG:-local}
    build:
      <<: *dotnet-build
      args:
        PROJECT: backend/services/Iam/src/Nerv.IIP.Iam.Web/Nerv.IIP.Iam.Web.csproj
        DLL: Nerv.IIP.Iam.Web.dll
    environment:
      <<: *dotnet-env
      ConnectionStrings__IamDb: Host=postgres;Port=5432;Database=nerv_iip_iam;Username=${NERV_IIP_POSTGRES_USER:-nerv};Password=${NERV_IIP_POSTGRES_PASSWORD:?set NERV_IIP_POSTGRES_PASSWORD}
      Iam__Seed__Enabled: ${NERV_IIP_IAM_SEED_ENABLED:-false}
      Iam__Seed__AdminPassword: ${NERV_IIP_IAM_SEED_ADMIN_PASSWORD:-}
      Iam__Seed__ConnectorHostSecret: ${NERV_IIP_CONNECTOR_HOST_SECRET:?set NERV_IIP_CONNECTOR_HOST_SECRET}
      Iam__Seed__ExternalClientSecret: ${NERV_IIP_EXTERNAL_CLIENT_SECRET:-}
      Iam__Jwt__SigningKeys__0__Kid: ${NERV_IIP_IAM_JWT_SIGNING_KEY_ID:?set NERV_IIP_IAM_JWT_SIGNING_KEY_ID}
      Iam__Jwt__SigningKeys__0__PrivateKeyPem: ${NERV_IIP_IAM_JWT_PRIVATE_KEY_PEM:?set NERV_IIP_IAM_JWT_PRIVATE_KEY_PEM}
      Iam__Jwt__AccessTokenMinutes: ${NERV_IIP_IAM_ACCESS_TOKEN_MINUTES:-15}
    ports:
      - "${NERV_IIP_IAM_PORT:-5102}:8080"

  ops:
    <<: *dotnet-service
    image: nerv-iip/ops:${NERV_IIP_IMAGE_TAG:-local}
    build:
      <<: *dotnet-build
      args:
        PROJECT: backend/services/Ops/src/Nerv.IIP.Ops.Web/Nerv.IIP.Ops.Web.csproj
        DLL: Nerv.IIP.Ops.Web.dll
    environment:
      <<: *dotnet-env
      ConnectionStrings__OpsDb: Host=postgres;Port=5432;Database=nerv_iip_ops;Username=${NERV_IIP_POSTGRES_USER:-nerv};Password=${NERV_IIP_POSTGRES_PASSWORD:?set NERV_IIP_POSTGRES_PASSWORD}
      Iam__BaseUrl: http://iam:8080
    ports:
      - "${NERV_IIP_OPS_PORT:-5103}:8080"

  file-storage:
    <<: *dotnet-service
    image: nerv-iip/file-storage:${NERV_IIP_IMAGE_TAG:-local}
    build:
      <<: *dotnet-build
      args:
        PROJECT: backend/services/FileStorage/src/Nerv.IIP.FileStorage.Web/Nerv.IIP.FileStorage.Web.csproj
        DLL: Nerv.IIP.FileStorage.Web.dll
    environment:
      <<: *dotnet-env
      ConnectionStrings__FileStorageDb: Host=postgres;Port=5432;Database=nerv_iip_filestorage;Username=${NERV_IIP_POSTGRES_USER:-nerv};Password=${NERV_IIP_POSTGRES_PASSWORD:?set NERV_IIP_POSTGRES_PASSWORD}
      Storage__Provider: MinIO
      Storage__MinIO__Endpoint: http://minio:9000
      Storage__MinIO__AccessKey: ${NERV_IIP_MINIO_ROOT_USER:?set NERV_IIP_MINIO_ROOT_USER}
      Storage__MinIO__SecretKey: ${NERV_IIP_MINIO_ROOT_PASSWORD:?set NERV_IIP_MINIO_ROOT_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      otel-collector:
        condition: service_started
    ports:
      - "${NERV_IIP_FILE_STORAGE_PORT:-5104}:8080"

  notification:
    <<: *dotnet-service
    image: nerv-iip/notification:${NERV_IIP_IMAGE_TAG:-local}
    build:
      <<: *dotnet-build
      args:
        PROJECT: backend/services/Notification/src/Nerv.IIP.Notification.Web/Nerv.IIP.Notification.Web.csproj
