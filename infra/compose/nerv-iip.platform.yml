    image: nerv-iip/business-industrial-telemetry:${NERV_IIP_IMAGE_TAG:-local}
    build:
      <<: *dotnet-build
      args:
        PROJECT: backend/services/Business/IndustrialTelemetry/src/Nerv.IIP.Business.IndustrialTelemetry.Web/Nerv.IIP.Business.IndustrialTelemetry.Web.csproj
