# Project environment shortcuts for Codex.
version = 1
name = "Nerv-IIP"

[setup]
script = '''
cd "$CODEX_WORKTREE_PATH"
npx skills experimental_install
corepack enable
pnpm -C frontend install --frozen-lockfile
dotnet restore backend/Nerv.IIP.sln
dotnet restore connector-hosts/Nerv.IIP.ConnectorHost.sln
'''

[[actions]]
name = "还原skills"
icon = "tool"
command = "npx skills experimental_install"

[[actions]]
name = "安装前端依赖"
icon = "tool"
command = "pnpm -C frontend install --frozen-lockfile"

[[actions]]
name = "后端测试"
icon = "tool"
command = "dotnet test backend/Nerv.IIP.sln"

[[actions]]
name = "Connector Host测试"
icon = "tool"
command = "dotnet test connector-hosts/Nerv.IIP.ConnectorHost.sln"

[[actions]]
name = "前端质量门禁"
icon = "tool"
command = "pnpm -C frontend check && pnpm -C frontend lint && pnpm -C frontend fmt && pnpm -C frontend typecheck && pnpm -C frontend test && pnpm -C frontend build"

[[actions]]
name = "导出Gateway OpenAPI"
icon = "tool"
command = "pwsh scripts/export-gateway-openapi.ps1"

[[actions]]
name = "生成前端API Client"
icon = "tool"
command = "pnpm -C frontend generate:api"

[[actions]]
name = "验证第一阶段纵切"
icon = "tool"
command = "pwsh scripts/verify-first-slice.ps1"

[[actions]]
name = "验证第二阶段运维闭环"
icon = "tool"
command = "pwsh scripts/verify-second-slice-ops.ps1"

[[actions]]
name = "验证第三阶段控制台"
icon = "tool"
command = "pwsh scripts/verify-third-slice-console.ps1"

[[actions]]
name = "验证第四阶段真实基础设施"
icon = "tool"
command = "pwsh scripts/verify-fourth-slice-real-infra.ps1"
